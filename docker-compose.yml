services:
  app:
    build: .
    image: viral-videos
    user: "${UID}:${GID}"
    env_file: .env
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
      - ./inputs:/app/inputs
      - ./output:/app/output
      - ./assets:/app/assets
      - ./config:/app/config
      - ./temp:/app/temp
    working_dir: /app
